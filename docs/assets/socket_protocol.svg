<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 340" width="100%" height="auto">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
  </defs>
  <style>
    :root {
      --bg-canvas: #ffffff;
      --bg-box: #f8fafc;
      --border-box: #cbd5e1;
      --text-main: #0f172a;
      --text-sub: #64748b;
      --line: #94a3b8;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-canvas: #0d1117;
        --bg-box: #161b22;
        --border-box: #30363d;
        --text-main: #c9d1d9;
        --text-sub: #8b949e;
        --line: #484f58;
      }
    }
    
    .box-bg { fill: var(--bg-box); stroke: var(--border-box); stroke-width: 1.5px; }
    .text-title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 13px; font-weight: 600; fill: var(--text-main); text-anchor: middle; }
    .text-desc { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 11px; fill: var(--text-sub); text-anchor: middle; }
    .text-boundary { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 10px; font-weight: 700; fill: var(--text-sub); letter-spacing: 1px; }
    .conn-line { fill: none; stroke: var(--line); stroke-width: 2px; }
    .conn-line-dashed { fill: none; stroke: var(--line); stroke-width: 1.5px; stroke-dasharray: 4,4; }
    .accent-gradient-1 { fill: url(#grad1); stroke: #334155; stroke-width: 1px; }
    .accent-gradient-2 { fill: url(#grad2); stroke: #334155; stroke-width: 1px; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="var(--line)"/>
    </marker>
  </defs>
  <!-- Left Column: Guest Sandbox Area -->
  <g transform="translate(30, 40)">
    <rect class="box-bg" width="340" height="55" rx="8"/>
    <text class="text-title" x="170" y="24">Guest User Process</text>
    <text class="text-desc" x="170" y="40">Runs: notify-send "build done"</text>
  </g>
  <g transform="translate(30, 130)">
    <rect class="box-bg" width="340" height="55" rx="8"/>
    <text class="text-title" x="170" y="24">Interceptor Symlink</text>
    <text class="text-desc" x="170" y="40">Points to static podbox-guest agent</text>
  </g>
  <g transform="translate(30, 220)">
    <rect class="accent-gradient-1" width="340" height="55" rx="8"/>
    <text class="text-title" x="170" y="24" fill="#ffffff">podbox-guest --daemon</text>
    <text class="text-desc" x="170" y="40" fill="#ffffff" opacity="0.85">Poll-based Event Loop</text>
  </g>
  <!-- Center: Boundary Line -->
  <line x1="410" y1="20" x2="410" y2="310" stroke="var(--border-box)" stroke-width="1.5" stroke-dasharray="6,6"/>
  <text class="text-boundary" x="410" y="15" text-anchor="middle">CONTAINER BOUNDARY</text>
  <!-- Right Column: Host Environment -->
  <g transform="translate(450, 220)">
    <rect class="box-bg" width="340" height="55" rx="8"/>
    <text class="text-title" x="170" y="24">Host Socket Connection</text>
    <text class="text-desc" x="170" y="40">Systemd socket at %t/podbox/&lt;name&gt;.sock</text>
  </g>
  <!-- Right: Host Graphical Output Box -->
  <g transform="translate(450, 40)">
    <rect class="box-bg" width="340" height="145" rx="8"/>
    <text class="text-title" x="170" y="24">Host Desktop Environment</text>
    <text class="text-desc" x="170" y="38">Renders secure UI triggers on the host</text>
    <!-- Render Mock Notification Window -->
    <g transform="translate(20, 55)">
      <rect x="0" y="0" width="300" height="70" rx="6" fill="var(--bg-canvas)" stroke="var(--border-box)" stroke-width="1.5"/>
      <circle cx="35" cy="35" r="16" fill="url(#grad2)"/>
      <text font-family="-apple-system, sans-serif" font-size="11" font-weight="700" fill="var(--text-main)" x="65" y="30">Notify-Send Intercepted</text>
      <text font-family="-apple-system, sans-serif" font-size="10" fill="var(--text-sub)" x="65" y="46">Message: "build done"</text>
    </g>
  </g>
  <!-- Connectors -->
  <path class="conn-line" d="M 200 95 L 200 122" marker-end="url(#arrow)"/>
  <path class="conn-line" d="M 200 185 L 200 212" marker-end="url(#arrow)"/>
  <path class="conn-line" d="M 370 247 L 442 247" marker-end="url(#arrow)"/>
  <path class="conn-line" d="M 620 220 L 620 193" marker-end="url(#arrow)"/>
</svg>
