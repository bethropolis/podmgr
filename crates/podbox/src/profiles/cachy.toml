[image]
name = "cachy"
base = "cachy-latest"
image = "ghcr.io/bethropolis/podbox:cachy-latest"

[image.packages]
manager = "pacman"
install = ["fastfetch", "fish"]

[container]
name = "cachy"
home = "~/containers/cachy"
shell = "/usr/bin/fish"

[integration]
wayland = true
audio = true
gpu = true
notify = true
clipboard = true
xdg_open = true
dbus = true
ssh_agent = true
gpg_agent = true
sync_themes = true
sync_icons = true
sync_fonts = true

[integration.xdg_dirs]
documents = true
downloads = true
pictures = true
music = true
videos = true
desktop = true
projects = true

[dbus]
preset = "gnome"

[lifecycle]
quadlet = true
autostart = true
auto_update = true
