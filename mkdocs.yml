site_name: podbox
site_url: https://bethropolis.github.io/podbox/
site_description: Podman-native container tool with Wayland passthrough, systemd Quadlet management, and declarative TOML config. No daemon, no home mounting.
site_author: bethropolis
repo_url: https://github.com/bethropolis/podbox
repo_name: bethropolis/podbox
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/podbox-logo.svg
  favicon: assets/podbox-logo.svg
  palette:
    - scheme: catppuccin-mocha
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - scheme: catppuccin-latte
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit

nav:
  - Home: index.md
  - Configuration: config.md
  - Architecture: architecture.md
  - Desktop Integration: export.md
  - Guest Daemon: guest.md
  - D-Bus Proxy: dbus-proxy.md
  - Quadlet Reference: quadlet.md
  - Protocol: protocol.md
  - Troubleshooting: troubleshooting.md

extra_css:
  - stylesheets/catppuccin.css

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
  - social

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
  - attr_list
  - toc:
      permalink: true

