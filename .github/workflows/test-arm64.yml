name: Test arm64 cross-compilation

on:
  push:
    branches: [feat/arm64-support]
  pull_request:
    branches: [feat/arm64-support]

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Install targets
        run: rustup target add x86_64-unknown-linux-gnu x86_64-unknown-linux-musl aarch64-unknown-linux-gnu aarch64-unknown-linux-musl

      - name: Install cross-compilation dependencies
        run: sudo apt-get update && sudo apt-get install -y musl-tools gcc-aarch64-linux-gnu

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - uses: goreleaser/goreleaser-action@v6
        with:
          args: release --snapshot --clean
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Inspect dist
        run: |
          echo "=== dist/ contents ==="
          find dist/ -type f | sort
          echo ""
          echo "=== archives ==="
          ls -lh dist/*.tar.gz 2>/dev/null || echo "no archives"
          echo ""
          echo "=== Docker build context structure ==="
          find dist/ -type d | head -40

      - uses: actions/upload-artifact@v4
        with:
          name: dist-snapshot
          path: dist/
